seed: 7
output_dir: checkpoints/smoke_lightning

runtime:
  dtype: bfloat16
  model_load_device: auto
  max_storage: 10TB
  preferred_gpu: 7
  require_idle_gpu: true

trainer:
  accelerator: gpu
  devices: 1
  strategy: auto
  precision: bf16-mixed
  log_every_n_steps: 1
  check_val_every_n_epoch: 1

model:
  name: hf-internal-testing/tiny-random-LlamaForCausalLM
  context_length: 256
  compactor:
    num_latents: 16
    num_blocks: 2
    latent_dropout: 0.0
    beta_base: zero
    layer_compactor_groups: 0
    sink_tokens: 0
    exact_tokens: 0
    exact_strategy: prefix
    head_specific_latents: false

training:
  steps: 5
  batch_size: 1
  learning_rate: 1.0e-4
  gradient_clip_val: 1.0
  kl_weight: 1.0
  reverse_kl_weight: 0.0
  ce_weight: 0.1
  aux_letter_loss_weight: 0.0
  aux_letter_enable_thinking: false
  loss_mode: token
  target_mode: letter
  score_mode: letter
  use_chat_template: true
  enable_thinking: false
  eval_enable_thinking: false
  balanced_answer_sampling: false
  trainable_scope: all
  save_every: 0

data:
  train_file: data/mcq/train.jsonl
  validation_file: data/mcq/validation.jsonl
  limit_train: null
  limit_validation: 32
  num_workers: 0
