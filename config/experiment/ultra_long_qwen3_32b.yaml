extends: ../base.yaml
output_dir: checkpoints/ultra_long_qwen3_32b

model:
  name: Qwen/Qwen3-32B
  context_length: 131684
  compactor:
    num_latents: 4096
    beta_base: zero
    head_specific_latents: true

training:
  steps: 2900
  batch_size: 1
  learning_rate: 2.0e-6
  loss_mode: token
  target_mode: teacher_response
  reverse_kl_weight: 0.5
  aux_letter_loss_weight: 0.05
